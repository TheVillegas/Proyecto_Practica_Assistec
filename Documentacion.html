# 📘 Documentación del Sistema Asistec

Este documento detalla la arquitectura, roles de usuario y flujos funcionales del sistema Asistec, diseñado para la gestión de laboratorios y trazabilidad de muestras (ALI/RAM/TPA).

---

## 🏗️ 1. Arquitectura General

El sistema utiliza una arquitectura **Client-Server** clásica con una API RESTful.

*   **Frontend**: Ionic + Angular (Gestión de UI, Formularios Reactivos, Servicios HTTP).
*   **Backend**: Node.js + Express (API REST, Autenticación JWT, Lógica de Negocio).
*   **Base de Datos**: Oracle Database (Persistencia, Procedimientos Almacenados).

### Diagrama de Contexto

```mermaid
graph TD
    User((👤 Usuario))
    subgraph "Frontend (Ionic)"
        UI[Componentes UI]
        AuthService[Auth Service]
        ReportService[Report Services]
    end
    subgraph "Backend (Node.js)"
        API[API Router]
        Controllers[Controladores]
        AuthMw[Auth Middleware]
    end
    DB[(🗄️ Oracle DB)]

    User -->|Interactúa| UI
    UI -->|HTTP Requests| API
    API -->|Valida Token| AuthMw
    API -->|Procesa Datos| Controllers
    Controllers -->|SQL Queries| DB
```

---

## 👥 2. Roles y Permisos

El sistema identifica los permisos basándose en el **ROL** del usuario dentro del JWT.

| Rol ID | Nombre | Permisos Clave |
| :--- | :--- | :--- |
| **0** | **Analista** | - Crear/Ver muestras.<br>- Llenar reportes (RAM/TPA).<br>- *Bloqueado:* No puede editar reportes "PENDIENTES" (regla de negocio a confirmar) o "VERIFICADOS". |
| **1** | **Supervisor** | - Todo lo del Analista.<br>- **Eliminar Muestras**.<br>- Modificar reportes "VERIFICADOS" o "FINALIZADOS".<br>- Validar/Verificar reportes. |

---

## 🔐 3. Módulo de Autenticación

El acceso está protegido mediante **JWT (Json Web Tokens)**.

### Flujo de Login

1.  Usuario ingresa correo y contraseña.
2.  Backend busca el RUT asociado al correo (`Analista.obtenerPorCorreo`).
3.  Backend busca el usuario completo por RUT.
4.  Compara contraseña (`bcrypt.compare`).
5.  Si es válido, retorna Token y Datos de Usuario.

```mermaid
sequenceDiagram
    participant User as 👤 Usuario
    participant Front as 📱 Login Page
    participant API as ⚙️ AnalistaController
    participant DB as 🗄️ Oracle

    User->>Front: Ingresa Credenciales
    Front->>API: POST /api/analistas/login
    API->>DB: SELECT RUT FROM ANALISTAS WHERE CORREO = ?
    DB-->>API: Retorna RUT
    API->>DB: SELECT * FROM ANALISTAS WHERE RUT = ?
    DB-->>API: Retorna Hash Password
    API->>API: bcrypt.compare(pass, hash)
    alt Credenciales Válidas
        API->>API: Generar JWT (sign)
        API-->>Front: 200 OK { token, usuario }
        Front->>Front: Guardar Token (Storage)
        Front->>User: Redirigir a Home
    else Inválidas
        API-->>Front: 401 Unauthorized
        Front->>User: Muestra Error
    end
```

---

## 🧪 4. Gestión de Muestras (ALI)

El núcleo del sistema es la **Muestra ALI**. Todos los reportes (RAM, TPA) nacen de una muestra.

*   **Identificador Principal**: `codigo_ali` (ej: 20240101-001).
*   **Acciones**: Crear, Listar, Filtrar, Eliminar (Solo Supervisor).

---

## 📊 5. Flujos de Reportes

### 5.1 Reporte RAM (Recuento Aerobios Mesófilos)

Este módulo maneja el cálculo complejo de colonias y validación de resultados.

**Funcionalidad Destacada: Preview de Cálculo**
El sistema permite "previsualizar" el cálculo ISO 7218 antes de guardar.

```mermaid
sequenceDiagram
    participant Front as 📱 ReporteRAM Page
    participant API as ⚙️ ReporteRAMController
    participant Logic as 🧠 Modelo RAM

    Front->>API: POST /calcular (diluciones, volumen)
    API->>Logic: ReporteRAM.calcularRecuentoColonias(input)
    Logic->>Logic: Aplica ISO 7218 (Filtra MNPC, selecciona pares)
    Logic-->>API: Retorna Resultado Calculado
    API-->>Front: JSON { resultado, n1, n2, ... }
    Front->>Front: Muestra Preview al Analista
```

**Guardado con Validación de Estados:**
Antes de guardar, el sistema verifica si el reporte ya fue cerrado.

*   **Regla**: Si `estado == 'VERIFICADO'` Y `rol != 1` (No Supervisor) ➔ **Error 403 Forbidden**.

### 5.2 Reporte TPA (Trazabilidad Pesado y Análisis)

Maneja datos de tiempos, temperaturas y responsables en múltiples etapas.

*   **Validación de Fechas**: Se controlan inicios y términos de incubación.
*   **Verificación**: Endpoint `PUT /:codigo_ali/verificar` cambia el estado a VERIFICADO, bloqueando ediciones futuras por analistas normales.
*   **Exportación**: Endpoint `POST /exportar/tpa` genera un Excel (.xlsx) combinando una plantilla base con los datos del reporte.

---

## 🗂️ 6. Catálogos y Datos Maestros

El sistema centraliza la configuración en tablas de catálogo para evitar valores "quemados" (hardcoded).

*   **Endpoints**: `/api/catalogo/*`
*   **Contenidos**:
    *   `LUGARES_ALMACENAMIENTO`
    *   `INSTRUMENTOS`, `MICROPIPETAS`, `EQUIPOS_LAB`
    *   `DILUYENTES`, `AGAR` (Material Siembra)
    *   `MAESTRO_FORMAS_CALCULO`

---

## 📤 7. Exportación de Reportes (Excel)

El sistema genera documentos oficiales en formato `.xlsx` utilizando plantillas predefinidas.

*   **Librería**: `exceljs` (Backend Node.js).
*   **Plantilla Base**: `Trazabilidad ALIMENTOS Merello.xlsx` (ubicado en `Backend/templates`).
*   **Proceso**:
    1.  Frontend recopila los datos del reporte TPA.
    2.  Envía JSON a `POST /api/exportar/tpa`.
    3.  Backend carga la plantilla Excel.
    4.  Inyecta datos en celdas específicas (Mapeo JSON -> Celda Excel).
    5.  Clona filas si hay múltiples responsables o etapas dinámicas.
    6.  Guarda el archivo en `Backend/outputs` con timestamp.
    7.  Retorna y descarga el archivo al cliente.

---

## 🛡️ 8. Middleware de Seguridad y Validación

El `authMiddleware.js` es el guardián de la API.

**Estrategia de Extracción de Token:**
El sistema es flexible y busca el JWT en este orden:
1.  **Header**: `x-access-token`
2.  **body**: `token` (Legacy)
3.  **Header**: `Authorization: Bearer <token>` (Estándar recomendado)

**Validación de Roles (`authorize`)**:
Permite restringir rutas a múltiples roles.
*   Uso: `authMiddleware.authorize([1])` (Solo Supervisor).
*   Si el usuario no tiene el rol en su Token -> **401 Unauthorized**.

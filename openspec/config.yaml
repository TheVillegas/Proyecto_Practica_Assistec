# OpenSpec Configuration — proyecto_practica_assistec
# Auto-generated by sdd-init (2026-06-05)

context: >-
  Proyecto AssisTec Lab — sistema de gestión de laboratorio microbiológico.
  Frontend: Angular 20 + Ionic 8 + Tailwind 3 + SCSS.
  Backend activo: AssisTec API/ (Node.js + Express 5 + Prisma 6 + PostgreSQL 16).
  Backend legacy: Backend/ (deprecated, pg raw SQL).
  JWT auth con roles: ANALISTA, COORDINADORA, JEFE_AREA, INGRESO + ADMIN (rol 4).
  pnpm monorepo con Docker Compose para PostgreSQL.

strict_tdd: true

testing:
  backend:
    runner: jest
    command: cd "AssisTec API" && pnpm test
    framework: Jest 30 + supertest 7
    layers:
      unit: true
      integration: true
      e2e: false
  frontend:
    runner: karma
    command: cd Frontend && pnpm test -- --watch=false --browsers=ChromeHeadless
    framework: Jasmine 5 + Karma 6
    layers:
      unit: true
      integration: false
      e2e: false
    lint: cd Frontend && pnpm run lint
  coverage:
    frontend: true
    backend: false

phases:
  propose:
    requires: explore
    output: openspec/changes/{change}/proposal.md
  spec:
    requires: propose
    output: openspec/changes/{change}/spec.md
  design:
    requires: spec
    output: openspec/changes/{change}/design.md
  tasks:
    requires: design
    output: openspec/changes/{change}/tasks.md
  apply:
    requires: tasks
    strict_tdd_required: true
  verify:
    requires: apply
    evidence_required: true
  archive:
    requires: verify
    action: sync-delta-specs

chained_pr:
  strategy: ask-always
  review_budget_lines: 400

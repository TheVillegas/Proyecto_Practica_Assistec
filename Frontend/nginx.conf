server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: cualquier ruta no encontrada → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy inverso hacia el backend (API nueva)
    location /api/ {
        proxy_pass http://backend_asistec:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy inverso hacia el backend (API legacy)
    location /AsisTec/ {
        proxy_pass http://backend_asistec:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

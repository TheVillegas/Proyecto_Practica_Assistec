<ion-header>
  <ion-toolbar class="header-toolbar">
    <ion-buttons slot="start">
      <ion-button (click)="confirmarCancelar()" class="btn-back">
        <ion-icon name="arrow-back-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title class="header-title">
      <ion-icon name="flask-outline" class="header-icon"></ion-icon>
      Análisis de Salmonella
    </ion-title>
    <ion-buttons slot="end">
      <span class="badge-etapa">{{ pasoActual() }}/{{ TOTAL_PASOS }}</span>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="page-content">
  <div class="wizard-container">

    <!-- ═══════════ BARRA DE PROGRESO + STEPPER ══════════ -->
    <div class="stepper-wrapper">
      <div class="stepper-bar">
        <div class="stepper-progress" [style.width.%]="progresoPorcentaje"></div>
      </div>
      <div class="stepper-steps">
        <button *ngFor="let nombre of NOMBRES_ETAPAS; let i = index" class="step-btn" type="button"
          [class.step-btn--active]="pasoActual() === i + 1" [class.step-btn--done]="pasoActual() > i + 1"
          (click)="irAPaso(i + 1)">
          <span class="step-circle">
            <ion-icon *ngIf="pasoActual() > i + 1" name="checkmark-outline"></ion-icon>
            <span *ngIf="pasoActual() <= i + 1">{{ i + 1 }}</span>
          </span>
          <span class="step-label">{{ nombre }}</span>
        </button>
      </div>
    </div>

    <form [formGroup]="form">

      <!-- ════════ ETAPA 1: INICIO E INCUBACIÓN ════════ -->
      <div *ngIf="pasoActual() === 1" class="etapa-panel animate__animated animate__fadeIn">
        <div class="form-card">
          <div class="form-card-header">
            <div class="form-card-title-group">
              <ion-icon name="time-outline" class="card-header-icon"></ion-icon>
              <h2 class="form-card-title">1. Inicio e Incubación</h2>
            </div>
          </div>
          <div class="form-card-body">
            <app-sal-etapa1-inicio
              [formGroupFase1]="fase1Group"
              [formGroupFase2a]="fase2aGroup"
              [responsables]="listaResponsables"
              [alertaTiempo25min]="formulario?.fase2a?.alertaTiempo25min === true">
            </app-sal-etapa1-inicio>
          </div>
        </div>
      </div>

      <!-- ════════ ETAPA 2: CONTROLES DE CALIDAD ════════ -->
      <div *ngIf="pasoActual() === 2" class="etapa-panel animate__animated animate__fadeIn">
        <div class="form-card">
          <div class="form-card-header">
            <div class="form-card-title-group">
              <ion-icon name="shield-checkmark-outline" class="card-header-icon"></ion-icon>
              <h2 class="form-card-title">2. Controles de Calidad</h2>
            </div>
          </div>
          <div class="form-card-body">
            <app-sal-etapa2-controles
              [formGroupFase2b]="fase2bGroup"
              [formGroupFase2c]="fase2cGroup"
              [equiposIncubacion]="listaEstufas">
            </app-sal-etapa2-controles>
          </div>
        </div>
      </div>

      <!-- ════════ ETAPA 3: TRASPASO Y ENRIQUECIMIENTO SELECTIVO ════════ -->
      <div *ngIf="pasoActual() === 3" class="etapa-panel animate__animated animate__fadeIn">
        <div class="form-card">
          <div class="form-card-header">
            <div class="form-card-title-group">
              <ion-icon name="beaker-outline" class="card-header-icon"></ion-icon>
              <h2 class="form-card-title">3. Traspaso y Enriquecimiento Selectivo</h2>
            </div>
          </div>
          <div class="form-card-body">
            <app-sal-etapa3-traspaso
              [formGroupFase3a]="fase3aGroup"
              [formGroupFase3b]="fase3bGroup"
              [muestras]="muestrasEtapa3"
              (muestrasChange)="muestrasEtapa3 = $event"
              [equiposIncubacion]="listaEstufas">
            </app-sal-etapa3-traspaso>
          </div>
        </div>
      </div>

      <!-- ════════ ETAPA 4: AISLAMIENTO E IDENTIFICACIÓN ════════ -->
      <div *ngIf="pasoActual() === 4" class="etapa-panel animate__animated animate__fadeIn">
        <div class="form-card">
          <div class="form-card-header">
            <div class="form-card-title-group">
              <ion-icon name="albums-outline" class="card-header-icon"></ion-icon>
              <h2 class="form-card-title">4. Aislamiento e Identificación</h2>
            </div>
          </div>
          <div class="form-card-body">
            <app-sal-etapa4-aislamiento
              [formGroupFase4a]="fase4aGroup"
              [muestras]="muestrasEtapa4"
              (muestrasChange)="muestrasEtapa4 = $event"
              [equiposIncubacion]="listaEstufas">
            </app-sal-etapa4-aislamiento>
          </div>
        </div>
      </div>

      <!-- ════════ ETAPA 5: RESULTADO FINAL ════════ -->
      <div *ngIf="pasoActual() === 5" class="etapa-panel animate__animated animate__fadeIn">
        <div class="form-card">
          <div class="form-card-header">
            <div class="form-card-title-group">
              <ion-icon name="checkmark-circle-outline" class="card-header-icon"></ion-icon>
              <h2 class="form-card-title">5. Resultado Final</h2>
            </div>
          </div>
          <div class="form-card-body">
            <app-sal-etapa5-resultado
              [resultados]="muestrasEtapa5"
              [calculado]="calculado"
              (calcular)="calcularResultadoFinal()">
            </app-sal-etapa5-resultado>
          </div>
        </div>
      </div>

    </form>

    <!-- ═════════════════ BARRA DE NAVEGACIÓN INFERIOR ═══════════════════════ -->
    <div class="nav-footer">
      <button type="button" class="btn-cancel" (click)="confirmarCancelar()">
        <ion-icon name="close-outline"></ion-icon>
        Cancelar
      </button>
      <div class="nav-footer__actions">
        <button type="button" class="btn-secondary" (click)="retrocederPaso()" *ngIf="pasoActual() > 1">
          <ion-icon name="arrow-back-outline"></ion-icon>
          Anterior
        </button>
        <button type="button" class="btn-draft" (click)="guardarFormularioBorrador()">
          <ion-icon name="document-outline"></ion-icon>
          Guardar
        </button>
        <button type="button" class="btn-primary" (click)="avanzarPaso()" *ngIf="pasoActual() < TOTAL_PASOS">
          Siguiente
          <ion-icon name="arrow-forward-outline"></ion-icon>
        </button>
        <button type="button" class="btn-save" (click)="enviarFormulario()" *ngIf="pasoActual() === TOTAL_PASOS">
          <ion-icon name="checkmark-done-outline"></ion-icon>
          Confirmar Registro
        </button>
      </div>
    </div>

  </div>
</ion-content>

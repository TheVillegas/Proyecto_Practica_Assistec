<div [formGroup]="formGroup" class="control-card mb-6">
  <p class="control-title text-blue-700 border-b border-slate-200 pb-2">Traspaso a agares</p>

  <div class="grid-3col">
    <div class="form-group">
      <label class="form-label" for="fechaTraspasoAgares">Fecha traspaso a agares <span class="required-star">*</span></label>
      <input id="fechaTraspasoAgares" type="date" class="form-input"
        [class.input-error]="campoInvalido('fechaTraspasoAgares')"
        formControlName="fechaTraspasoAgares" [max]="hoy()"
        [attr.readonly]="(rol | modoLectura) ? true : null" />
      <span class="error-msg" *ngIf="campoInvalido('fechaTraspasoAgares')">Este campo es obligatorio.</span>
    </div>
    <div class="form-group">
      <label class="form-label" for="horaTraspasoAgares">Hora traspaso a agares <span class="required-star">*</span></label>
      <input id="horaTraspasoAgares" type="time" class="form-input"
        [class.input-error]="campoInvalido('horaTraspasoAgares')"
        formControlName="horaTraspasoAgares"
        [attr.readonly]="(rol | modoLectura) ? true : null" />
      <span class="error-msg" *ngIf="campoInvalido('horaTraspasoAgares')">Este campo es obligatorio.</span>
    </div>
    <div class="form-group">
      <label class="form-label" for="rutAnalistaTraspaso">Analista <span class="required-star">*</span></label>
      <select id="rutAnalistaTraspaso" class="form-select"
        [class.input-error]="campoInvalido('rutAnalistaTraspaso')"
        formControlName="rutAnalistaTraspaso"
        [disabled]="(rol | modoLectura)">
        <option value="">Seleccionar analista...</option>
        <option *ngFor="let r of listaResponsables" [value]="r.rut">{{ r.nombreApellido }}</option>
      </select>
      <span class="error-msg" *ngIf="campoInvalido('rutAnalistaTraspaso')">Debe seleccionar un analista.</span>
    </div>
  </div>

  <div class="grid-3col mt-4 pt-4 border-t border-slate-100">
    <div class="form-group">
      <label class="form-label" for="idMedioAgarXld">Agar XLD <span class="required-star">*</span></label>
      <select id="idMedioAgarXld" class="form-select"
        [class.input-error]="campoInvalido('idMedioAgarXld')"
        formControlName="idMedioAgarXld"
        [disabled]="(rol | modoLectura)">
        <option [ngValue]="null">Seleccionar medio...</option>
        <option *ngFor="let m of listaMediosCultivo" [ngValue]="m.idMedioCultivo">{{ m.nombre }}</option>
      </select>
      <span class="error-msg" *ngIf="campoInvalido('idMedioAgarXld')">Debe seleccionar un medio.</span>
    </div>
    <div class="form-group">
      <label class="form-label" for="idMedioAgarSs">Agar SS <span class="required-star">*</span></label>
      <select id="idMedioAgarSs" class="form-select"
        [class.input-error]="campoInvalido('idMedioAgarSs')"
        formControlName="idMedioAgarSs"
        [disabled]="(rol | modoLectura)">
        <option [ngValue]="null">Seleccionar medio...</option>
        <option *ngFor="let m of listaMediosCultivo" [ngValue]="m.idMedioCultivo">{{ m.nombre }}</option>
      </select>
      <span class="error-msg" *ngIf="campoInvalido('idMedioAgarSs')">Debe seleccionar un medio.</span>
    </div>
  </div>

  <div class="grid-2col mt-4 pt-4 border-t border-slate-100">
    <div class="form-group">
      <label class="form-label" for="idEstufaAgares">Estufa <span class="required-star">*</span></label>
      <select id="idEstufaAgares" class="form-select"
        [class.input-error]="campoInvalido('idEstufaAgares')"
        formControlName="idEstufaAgares"
        [disabled]="(rol | modoLectura)">
        <option [ngValue]="null">Seleccionar estufa...</option>
        <option *ngFor="let eq of listaEquiposIncubacion" [ngValue]="eq.idIncubacion">{{ eq.nombreEquipo }} ({{ eq.temperaturaRef }})</option>
      </select>
      <span class="error-msg" *ngIf="campoInvalido('idEstufaAgares')">Debe seleccionar una estufa.</span>
    </div>
    <div class="form-group">
      <label class="form-label" for="idBanoAgares">Baño térmico <span class="optional-tag">(opcional)</span></label>
      <select id="idBanoAgares" class="form-select" formControlName="idBanoAgares" [disabled]="(rol | modoLectura)">
        <option [ngValue]="null">Seleccionar baño...</option>
        <option *ngFor="let b of listaBanos" [ngValue]="b.idBano">{{ b.nombreEquipo }} ({{ b.temperaturaRef }})</option>
      </select>
    </div>
  </div>
</div>

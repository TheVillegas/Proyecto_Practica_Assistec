<div [formGroup]="formGroupFase2b" class="subetapa-section">
  <p class="subseccion-title">Fase 2B · Insumos utilizados</p>

  <div class="grid-2col">
    <div class="form-group">
      <label class="form-label" for="loteCaldo">Clave/lote de caldo APT o leche</label>
      <input id="loteCaldo" type="text" class="form-input" formControlName="loteCaldo" />
    </div>
    <div class="form-group">
      <label class="form-label" for="estufaIncubacion">Estufa de incubación</label>
      <ion-select id="estufaIncubacion" formControlName="estufaIncubacion" interface="popover" placeholder="— Seleccionar estufa —" class="form-select">
        <ion-select-option value="">— Seleccionar estufa —</ion-select-option>
        <ion-select-option *ngFor="let e of equiposIncubacion" [value]="e.idIncubacion">{{ e.nombreEquipo }} ({{ e.temperaturaRef }})</ion-select-option>
      </ion-select>
    </div>
  </div>

  <div class="form-radio-group mt-2">
    <label class="form-check-label">
      <input type="checkbox" class="form-checkbox" formControlName="tween80" />
      <span>Tween 80 / Pipetas desechables</span>
    </label>
    <label class="form-check-label">
      <input type="checkbox" class="form-checkbox" formControlName="micropipetas" />
      <span>Micropipetas</span>
    </label>
  </div>
</div>

<div class="seccion-divider"></div>

<div [formGroup]="formGroupFase2c" class="subetapa-section">
  <p class="subseccion-title">Fase 2C · Controles de calidad</p>

  <div class="grid-2col mb-4">
    <div class="form-group">
      <label class="form-label" for="analisisDescripcion">Análisis (descripción del control)</label>
      <input id="analisisDescripcion" type="text" class="form-input" formControlName="analisisDescripcion" />
    </div>
    <div class="form-group">
      <p class="form-label mb-1">Resultado control — Análisis</p>
      <div class="form-radio-group">
        <label class="form-check-label">
          <input type="radio" class="form-radio" formControlName="resultadoAnalisis" value="cumple" />
          <span class="badge-presencia">Cumple</span>
        </label>
        <label class="form-check-label">
          <input type="radio" class="form-radio" formControlName="resultadoAnalisis" value="no_cumple" />
          <span class="badge-ausencia">No cumple</span>
        </label>
      </div>
    </div>
  </div>

  <div class="grid-2col mb-4">
    <div class="form-group">
      <label class="form-label" for="controlBlancoAli">Control (+) y blanco en ALI</label>
      <input id="controlBlancoAli" type="text" class="form-input" formControlName="controlBlancoAli" />
    </div>
    <div class="form-group">
      <p class="form-label mb-1">Resultado control — Blanco</p>
      <div class="form-radio-group">
        <label class="form-check-label">
          <input type="radio" class="form-radio" formControlName="resultadoControlBlanco" value="cumple" />
          <span class="badge-presencia">Cumple</span>
        </label>
        <label class="form-check-label">
          <input type="radio" class="form-radio" formControlName="resultadoControlBlanco" value="no_cumple" />
          <span class="badge-ausencia">No cumple</span>
        </label>
      </div>
    </div>
  </div>

  <div class="grid-2col">
    <div class="form-group">
      <label class="form-label" for="controlSiembraAli">Control de siembra en ALI</label>
      <input id="controlSiembraAli" type="text" class="form-input" formControlName="controlSiembraAli" />
    </div>
    <div class="form-group">
      <p class="form-label mb-1">Resultado control — Siembra</p>
      <div class="form-radio-group">
        <label class="form-check-label">
          <input type="radio" class="form-radio" formControlName="resultadoControlSiembra" value="cumple" />
          <span class="badge-presencia">Cumple</span>
        </label>
        <label class="form-check-label">
          <input type="radio" class="form-radio" formControlName="resultadoControlSiembra" value="no_cumple" />
          <span class="badge-ausencia">No cumple</span>
        </label>
      </div>
    </div>
  </div>

  <div class="seccion-divider"></div>

  <p class="subseccion-title">Manual de inocuidad</p>
  <div class="grid-2col">
    <div class="form-group">
      <label class="form-label">Resultado desfavorable <span class="optional-tag">(opcional)</span></label>
      <div class="form-radio-group">
        <label class="form-check-label">
          <input type="radio" class="form-radio" formControlName="desfavorable" value="si" />
          <span>Sí</span>
        </label>
        <label class="form-check-label">
          <input type="radio" class="form-radio" formControlName="desfavorable" value="no" />
          <span>No</span>
        </label>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="fechaHoraEntrega">Fecha y hora de entrega <span class="optional-tag">(opcional)</span></label>
      <input id="fechaHoraEntrega" type="datetime-local" class="form-input" formControlName="fechaHoraEntrega" />
    </div>
    <div class="form-group">
      <label class="form-label" for="tablaPagina">Tabla / página <span class="optional-tag">(opcional)</span></label>
      <input id="tablaPagina" type="text" class="form-input" formControlName="tablaPagina" placeholder="Ej: Tabla 1 / Pág. 2" />
    </div>
    <div class="form-group">
      <label class="form-label" for="limite">Límite <span class="optional-tag">(opcional)</span></label>
      <input id="limite" type="text" class="form-input" formControlName="limite" placeholder="Ej: Ausencia/25g" />
    </div>
  </div>
</div>

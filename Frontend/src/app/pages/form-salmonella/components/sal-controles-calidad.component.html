<div [formGroup]="formGroup" class="control-card mb-6">
  <p class="control-title text-blue-700 border-b border-slate-200 pb-2">Control de análisis</p>
  <div class="grid-2col">
    <div class="form-group">
      <label class="form-label" for="descripcionCtrlAnalisis">Descripción del control</label>
      <input id="descripcionCtrlAnalisis" type="text" class="form-input" formControlName="descripcionCtrlAnalisis"
        [attr.readonly]="(rol | modoLectura) ? true : null" />
    </div>
    <div class="form-group bg-white p-3 rounded-lg border border-slate-100">
      <p class="text-xs font-semibold text-slate-600 mb-2">Resultado</p>
      <div class="flex gap-4">
        <label class="form-check-label text-xs">
          <input type="radio" class="form-radio" formControlName="resultadoCtrlAnalisis" value="cumple" />
          <span class="badge-presencia">Cumple</span>
        </label>
        <label class="form-check-label text-xs">
          <input type="radio" class="form-radio" formControlName="resultadoCtrlAnalisis" value="no_cumple" />
          <span class="badge-ausencia">No Cumple</span>
        </label>
      </div>
    </div>
  </div>
</div>

<ion-header>
  <ion-toolbar class="header-toolbar">
    <ion-buttons slot="start">
      <ion-button (click)="confirmarCancelar()" class="btn-back">
        <ion-icon name="arrow-back-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title class="header-title">
      <ion-icon name="flask-outline" class="header-icon"></ion-icon>
      Análisis de Enterobacterias
    </ion-title>
    <ion-buttons slot="end">
      <span class="badge-etapa">{{ pasoActual }}/{{ TOTAL_PASOS }}</span>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="page-content">
  <div class="wizard-container">

    <!-- Spinner de carga -->
    <div *ngIf="cargando()" class="flex justify-center items-center py-12">
      <ion-spinner name="crescent"></ion-spinner>
      <span class="ml-3 text-slate-600">Cargando catálogos y datos del formulario...</span>
    </div>

    <ng-container *ngIf="!cargando()">
      <!-- Banner modo lectura -->
      <div *ngIf="modoLectura" class="bg-amber-50 border border-amber-200 text-amber-800 p-4 rounded-lg mb-4 flex items-center gap-3">
        <ion-icon name="eye-outline"></ion-icon>
        <span>Modo lectura — solo Analista o Admin pueden editar.</span>
      </div>

      <!-- ═══════════ BARRA DE PROGRESO + STEPPER (3 etapas) ══════════ -->
      <div class="stepper-wrapper">
        <div class="stepper-bar">
          <div class="stepper-progress" [style.width.%]="progresoPorcentaje"></div>
        </div>
        <div class="stepper-steps">
          <button *ngFor="let nombre of NOMBRES_ETAPAS; let i = index" class="step-btn"
            [class.step-btn--active]="etapaActual === i + 1" [class.step-btn--done]="etapaActual > i + 1">
            <span class="step-circle">{{ i + 1 }}</span>
            <span class="step-label">{{ nombre }}</span>
          </button>
        </div>

        <!-- Subetapa activa -->
        <div class="subetapa-indicator">
          <ion-icon name="chevron-forward-outline" class="sub-icon"></ion-icon>
          <span>{{ subetapaActualLabel }}</span>
        </div>
      </div>

      <form [formGroup]="form">

        <!-- ════════ ETAPA 1: PREPARACIÓN ════════ -->
        <div *ngIf="etapaActual === 1" class="etapa-panel animate__animated animate__fadeIn">
          <div class="form-card">
            <div class="form-card-header">
              <div class="form-card-title-group">
                <ion-icon name="flask-outline" class="card-header-icon"></ion-icon>
                <h2 class="form-card-title">1. Preparación</h2>
              </div>
            </div>
            <div class="form-card-body">
              <app-ent-pesado *ngIf="pasoActual === 1" [formGroup]="pesadoGroup" [rol]="rol"
                [responsables]="catalogos.responsables()"></app-ent-pesado>
              <app-ent-homogeneizacion *ngIf="pasoActual === 2" [formGroup]="homogeneizacionGroup" [rol]="rol"
                [responsables]="catalogos.responsables()"></app-ent-homogeneizacion>
              <app-ent-sembrado *ngIf="pasoActual === 3" [formGroup]="sembradoGroup" [rol]="rol"
                [equiposIncubacion]="catalogos.equiposIncubacion()"
                [micropipetas]="catalogos.micropipetas()"
                [lotesAgarVRBG]="catalogos.lotesAgarVRBG()"
                [lotesTween80]="catalogos.lotesTween80()"
                [responsables]="catalogos.responsables()"></app-ent-sembrado>
              <app-ent-incubacion-prep *ngIf="pasoActual === 4" [formGroup]="incubacionPrepGroup" [rol]="rol"
                [equiposIncubacion]="catalogos.equiposIncubacion()"
                [lotesAgarVRBG]="catalogos.lotesAgarVRBG()"
                [responsables]="catalogos.responsables()"></app-ent-incubacion-prep>
            </div>
          </div>
        </div>

        <!-- ════════ ETAPA 2: ANÁLISIS ════════ -->
        <div *ngIf="etapaActual === 2" class="etapa-panel animate__animated animate__fadeIn">
          <div class="form-card">
            <div class="form-card-header header-analisis">
              <div class="form-card-title-group">
                <ion-icon name="analytics-outline" class="card-header-icon"></ion-icon>
                <h2 class="form-card-title">2. Análisis</h2>
              </div>
            </div>
            <div class="form-card-body">
              <app-ent-analisis-lectura [formGroup]="analisisLecturaGroup" [rol]="rol"
                [responsables]="catalogos.responsables()"></app-ent-analisis-lectura>
            </div>
          </div>
        </div>

        <!-- ════════ ETAPA 3: CONFIRMACIÓN ════════ -->
        <div *ngIf="etapaActual === 3" class="etapa-panel animate__animated animate__fadeIn">
          <div class="form-card">
            <div class="form-card-header header-confirmacion">
              <div class="form-card-title-group">
                <ion-icon name="checkmark-done-outline" class="card-header-icon"></ion-icon>
                <h2 class="form-card-title">3. Confirmación</h2>
              </div>
            </div>
            <div class="form-card-body">
              <app-ent-incubacion-conf *ngIf="pasoActual === 6" [formGroup]="incubacionConfGroup" [rol]="rol"
                [equiposIncubacion]="catalogos.equiposIncubacion()"
                [responsables]="catalogos.responsables()"></app-ent-incubacion-conf>
              <app-ent-lectura-oxidasa *ngIf="pasoActual === 7" [formGroup]="lecturaOxidasaGroup" [rol]="rol"
                [responsables]="catalogos.responsables()"></app-ent-lectura-oxidasa>
              <app-ent-resultados *ngIf="pasoActual === 8" [formGroup]="resultadosGroup" [rol]="rol"></app-ent-resultados>
            </div>
          </div>
        </div>

      </form>

      <!-- ═════════════════ BARRA DE NAVEGACIÓN INFERIOR ═══════════════════════ -->
      <div class="nav-footer">
        <button type="button" class="btn-cancel" (click)="confirmarCancelar()">
          <ion-icon name="close-outline"></ion-icon>
          Cancelar
        </button>
        <div class="nav-footer__actions">
          <button type="button" class="btn-draft" (click)="onGuardarBorrador()" *ngIf="!modoLectura">
            <ion-icon name="document-outline"></ion-icon>
            Guardar Borrador
          </button>
          <button type="button" class="btn-secondary" (click)="onAnterior()" *ngIf="pasoActual > 1 && !modoLectura">
            <ion-icon name="arrow-back-outline"></ion-icon>
            Anterior
          </button>
          <button type="button" class="btn-save" (click)="onSiguiente()" *ngIf="pasoActual === TOTAL_PASOS && !modoLectura && !formularioCompletado">
            <ion-icon name="save-outline"></ion-icon>
            Finalizar
          </button>
          <button type="button" class="btn-primary" (click)="onSiguiente()" *ngIf="pasoActual < TOTAL_PASOS && !modoLectura">
            Siguiente
            <ion-icon name="arrow-forward-outline"></ion-icon>
          </button>
        </div>
      </div>
    </ng-container>

  </div>
</ion-content>

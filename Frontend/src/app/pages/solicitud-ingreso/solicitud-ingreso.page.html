<app-header activePage="solicitud-ingreso"></app-header>

<ion-content [fullscreen]="true" class="sdi-content">
  <div class="page-container">
    <div class="page-header">
      <div class="page-header__text">
        <h1>Solicitud de Ingreso de Muestras</h1>
        <p>Formulario principal del flujo de ingreso, trazabilidad y validación.</p>
      </div>
      <div class="page-header__codes">
        <span class="code-pill">
          <ion-icon name="qr-code-outline"></ion-icon>
          {{ codigoALI }}
        </span>
        <span class="code-pill code-pill--secondary">
          <ion-icon name="document-text-outline"></ion-icon>
          {{ numeroActa }}
        </span>
        <button type="button" class="btn-secondary" *ngIf="solicitudId" (click)="nuevaSolicitud()">
          <ion-icon name="add-circle-outline"></ion-icon>
          Nueva solicitud
        </button>
      </div>
    </div>



    <div class="stepper-wrapper">
      <div class="stepper-bar">
        <div class="stepper-progress" [style.width.%]="progresoPorcentaje"></div>
      </div>
      <div class="stepper-steps">
        <button *ngFor="let nombre of NOMBRES_ETAPAS; let i = index" class="step-btn"
          [class.step-btn--active]="etapaActual === i + 1" [class.step-btn--done]="etapaActual > i + 1"
          (click)="irAEtapa(i + 1)">
          <span class="step-circle">{{ i + 1 }}</span>
          <span class="step-label">{{ nombre }}</span>
        </button>
      </div>
    </div>

    <form [formGroup]="form" class="form-wrapper">
      <app-step1-identificacion class="form-card" *ngIf="etapaActual === 1" [parentForm]="form" [reviewMode]="false"></app-step1-identificacion>

      <app-step2-datos-alimento class="form-card" *ngIf="etapaActual === 2" [parentForm]="form" [reviewMode]="false"></app-step2-datos-alimento>

      <app-step3-analisis-solicitado class="form-card" *ngIf="etapaActual === 3" [parentForm]="form" [reviewMode]="false" [equiposLaboratorio]="equiposLaboratorio"></app-step3-analisis-solicitado>

      <app-step4-observaciones class="form-card" *ngIf="etapaActual === 4" [parentForm]="form" [reviewMode]="false" [analistas]="analistas"></app-step4-observaciones>

      <app-step5-resolucion class="form-card" *ngIf="etapaActual === 5"
        [parentForm]="form"
        [reviewMode]="false"
        [categorias]="categorias"
        [subcategorias]="subcategorias"
        [formulariosCatalogo]="formulariosCatalogo"
        [muestras]="muestras"
        (toggleFormularioEvent)="toggleFormulario($event)"
        (agregarMuestraEvent)="agregarMuestra()"
        (eliminarMuestraEvent)="eliminarMuestra($event)"
        (toggleFormularioMuestraEvent)="toggleFormularioMuestra($event.muestra, $event.formulario)">
      </app-step5-resolucion>

      <app-step6-muestreo class="form-card" *ngIf="etapaActual === 6" [parentForm]="form" [reviewMode]="false" [equiposAlmacenamiento]="equiposAlmacenamiento"></app-step6-muestreo>

      <app-step7-observaciones-laboratorio class="form-card" *ngIf="etapaActual === 7" [parentForm]="form" [reviewMode]="false"></app-step7-observaciones-laboratorio>

      <app-step8-analisis-derivados class="form-card" *ngIf="etapaActual === 8" [parentForm]="form" [reviewMode]="false"></app-step8-analisis-derivados>

      <app-step9-flujo-validacion class="form-card" *ngIf="etapaActual === 9"
        [parentForm]="form"
        [reviewMode]="false"
        [coordinadoras]="coordinadoras"
        [jefaturas]="jefaturas"
        [badgeEstado]="badgeEstado"
        [fechaEnvioValidacion]="fechaEnvioValidacion">
      </app-step9-flujo-validacion>

      <app-step10-tiempos-entrega class="form-card" *ngIf="etapaActual === 10"
        [parentForm]="form"
        [reviewMode]="false"
        [tiempoEntregaNegativoDias]="tiempoEntregaNegativoDias"
        [fechaEstimadaEntregaNegativa]="fechaEstimadaEntregaNegativa"
        [tiempoEntregaConfirmacionDias]="tiempoEntregaConfirmacionDias"
        [fechaEstimadaEntregaConfirmacion]="fechaEstimadaEntregaConfirmacion"
        [fechaEnvioInformePositivo]="fechaEnvioInformePositivo"
        [fechaEnvioInformeNegativo]="fechaEnvioInformeNegativo">
      </app-step10-tiempos-entrega>

      <app-step11-resumen-informes class="form-card" *ngIf="etapaActual === 11"
        [parentForm]="form"
        [reviewMode]="false"
        [codigoALI]="codigoALI"
        [badgeEstado]="badgeEstado"
        [formulariosConsolidados]="formulariosConsolidados"
        [canSendToValidation]="canSendToValidation"
        (enviarAValidacion)="enviarAValidacion()">
      </app-step11-resumen-informes>

      <div class="nav-footer">
        <button type="button" class="btn-cancel" (click)="confirmarCancelar()">
          <ion-icon name="close-outline"></ion-icon>
          Cancelar
        </button>
        <div class="nav-footer__actions">
          <button type="button" class="btn-secondary" (click)="retrocederEtapa()" [disabled]="etapaActual === 1">
            <ion-icon name="arrow-back-outline"></ion-icon>
            Anterior
          </button>
          <button type="button" class="btn-save" (click)="guardarSolicitud()" *ngIf="etapaActual === TOTAL_ETAPAS" [disabled]="cargando">
            <ion-icon name="save-outline"></ion-icon>
            Guardar solicitud
          </button>
          <button type="button" class="btn-primary" (click)="avanzarEtapa()" *ngIf="etapaActual < TOTAL_ETAPAS">
            Siguiente
            <ion-icon name="arrow-forward-outline"></ion-icon>
          </button>
        </div>
      </div>
    </form>
  </div>
</ion-content>

<app-header activeSegment="busqueda"></app-header>

<ion-content [fullscreen]="true" class="bg-slate-50">
  <div class="flex-grow max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
    <!-- Search Section -->
    <div class="flex flex-col md:flex-row items-center justify-between gap-4 mb-8">
      <div class="relative w-full group">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <ion-icon name="search-outline"
            class="text-xl text-brand-primary group-focus-within:text-brand-primary transition-colors"></ion-icon>
        </div>
        <input
          class="block w-full pl-12 pr-4 py-3.5 border border-gray-300 rounded-xl leading-5 bg-white text-gray-900 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-primary/50 shadow-md transition-all"
          placeholder="Ingrese el código o cliente de la solicitud..." type="text" (input)="buscarSolicitud($event)" />
      </div>
    </div>
    
    <!-- Results Section -->
    <div class="space-y-6">
      <div class="flex items-end justify-between px-1">
        <h2 class="text-2xl font-bold text-gray-800 tracking-tight">Resultados de Búsqueda</h2>
        <span
          class="text-sm font-medium text-gray-600 bg-white px-3 py-1 rounded-full shadow-md border border-gray-200">
          {{listaFiltrada.length}} resultados encontrados
        </span>
      </div>

      <!-- Results List (Mock) -->
      <div *ngFor="let sol of listaFiltrada" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col md:flex-row justify-between items-center gap-4 hover:shadow-md transition-shadow">
        <div class="flex flex-col">
          <span class="text-xs font-semibold text-brand-primary uppercase tracking-wider mb-1">Solicitud</span>
          <span class="text-lg font-bold text-gray-900">{{ sol.id }}</span>
          <span class="text-sm text-gray-500 mt-1"><ion-icon name="business-outline" class="mr-1"></ion-icon> {{ sol.cliente }}</span>
        </div>
        
        <div class="flex flex-col items-center md:items-end">
           <span class="text-sm text-gray-600 font-medium mb-1"><ion-icon name="calendar-outline" class="mr-1"></ion-icon> {{ sol.fecha }}</span>
           <div class="flex gap-2 items-center mt-2">
             <span class="px-2 py-1 text-xs font-medium rounded-md bg-blue-100 text-blue-800">{{ sol.muestras }} Muestras</span>
             <span class="px-2 py-1 text-xs font-medium rounded-md bg-green-100 text-green-800">{{ sol.estado }}</span>
           </div>
        </div>
      </div>

      <!-- Empty State -->
      <div *ngIf="listaFiltrada.length === 0" class="text-center py-12 text-slate-400">
        <ion-icon name="search-outline" class="text-4xl mb-2"></ion-icon>
        <p>No se encontraron resultados</p>
      </div>
    </div>
  </div>
</ion-content>

<ion-content [fullscreen]="true" class="page-content">
  <div class="search-page-container">

    <!-- === PAGE TITLE === -->
    <div class="page-title-section">
      <h1 class="page-title">Búsqueda ALI</h1>
      <p class="page-subtitle">Consulte registros, historial y reportes de muestras.</p>
    </div>

    <!-- === SEARCH HEADER === -->
    <div class="search-header">
      <!-- Barra de búsqueda principal -->
      <div class="search-bar-wrapper">
        <div class="search-icon">
          <ion-icon name="search-outline"></ion-icon>
        </div>
        <input
          class="search-input"
          placeholder="Ingrese el código de la muestra ALI..."
          type="text"
          (input)="buscarALI($event)"
        />
      </div>
    </div>

    <!-- === RESULTS SECTION === -->
    <div class="results-section">

      <!-- Results Header -->
      <div class="results-header">
        <h2 class="results-title">Resultados de Búsqueda</h2>
        <span class="results-badge">
          {{ listaFiltrada.length }} encontrados
        </span>
      </div>

      <!-- Results List -->
      <div class="results-list">
        <app-ali-item-accordeon
          *ngFor="let muestra of listaFiltrada"
          [muestra]="muestra"
          (onDelete)="cargarMuestras()">
        </app-ali-item-accordeon>
      </div>

      <!-- Empty State -->
      <div *ngIf="listaFiltrada.length === 0" class="empty-state">
        <div class="empty-icon-box">
          <ion-icon name="search-outline"></ion-icon>
        </div>
        <h3 class="empty-title">Sin resultados</h3>
        <p class="empty-subtitle">No se encontraron muestras para el código ingresado.</p>
      </div>

    </div>
  </div>
</ion-content>

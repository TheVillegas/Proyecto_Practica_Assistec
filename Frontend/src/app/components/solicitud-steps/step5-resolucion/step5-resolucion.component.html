<div [formGroup]="parentForm">
  <div class="form-card-header">
    <div class="form-card-title-group">
      <ion-icon name="analytics-outline"></ion-icon>
      <h2 class="form-card-title">Etapa 5 — Formularios y análisis</h2>
    </div>
  </div>
  <div class="form-card-body">
    <ion-grid>
      <ion-row>
        <ion-col size="12" size-md="6">
          <div class="form-group">
            <label class="form-label">Categoría <span class="req">*</span></label>
            <select class="form-select" formControlName="categoria" [class.form-input--error]="campoInvalido('categoria')">
              <option value="" disabled>Seleccione categoría</option>
              <option *ngFor="let categoria of categorias" [value]="categoria.nombre">{{ categoria.nombre }}</option>
            </select>
            <span class="error-msg" *ngIf="campoInvalido('categoria')">Campo obligatorio.</span>
          </div>
        </ion-col>
        <ion-col size="12" size-md="6">
          <div class="form-group">
            <label class="form-label">Subcategoría <span class="req">*</span></label>
            <select class="form-select subcategoria-select" formControlName="subcategoria"
              [class.form-input--error]="campoInvalido('subcategoria')"
              [disabled]="!parentForm.get('categoria')?.value || subcategorias.length === 0">
              <option value="" disabled>
                {{ !parentForm.get('categoria')?.value ? 'Seleccione una categoría primero.' : (subcategorias.length === 0 ? 'Sin subcategorías disponibles' : 'Seleccione subcategoría') }}
              </option>
              <option *ngFor="let sub of subcategorias" [value]="sub.idSubcategoria">{{ sub.nombre }}</option>
            </select>
            <span class="error-msg" *ngIf="campoInvalido('subcategoria')">Campo obligatorio.</span>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>

    <div class="checklist-section" *ngIf="formulariosCatalogo.length > 0">
      <p class="muestra-hint">Se muestran solo análisis de microbiología.</p>
      <div class="checklist-grid">
        <label class="checklist-item" *ngFor="let formulario of formulariosCatalogo"
          [class.checklist-item--obligatorio]="formulario.obligatorio">
          <input type="checkbox" class="form-checkbox" [checked]="formulario.seleccionado"
            [disabled]="reviewMode || formulario.obligatorio" (change)="toggleFormulario(formulario)" />
          <span class="checklist-item__name">{{ formulario.nombre }}</span>
          <span class="tpa-badge" *ngIf="formulario.obligatorio">TPA requerido</span>
          <span class="muestra-hint" *ngIf="formulario.seleccionado">
            LE: {{ formulario.codigoLe || 'No acreditado' }} - Norma: {{ formulario.metodologiaNorma || 'Sin norma' }} - Dias: {{ formulario.diasNegativo ?? '--' }}/{{ formulario.diasConfirmacion ?? '--' }}
          </span>
        </label>
      </div>
    </div>

    <div class="muestras-section">
      <div class="muestras-header">
        <h3 class="checklist-title">
          <ion-icon name="layers-outline"></ion-icon>
          SubMuestras
        </h3>
        <button type="button" class="btn-add-muestra" (click)="agregarMuestra()" [disabled]="reviewMode">
          <ion-icon name="add-outline"></ion-icon>
          Agregar submuestra
        </button>
      </div>

      <div class="muestra-card" *ngFor="let muestra of muestras">
        <div class="muestra-card__header">
          <span class="muestra-card__title">
            <ion-icon name="beaker-outline"></ion-icon>
            {{ muestra.nombre }}
          </span>
          <button type="button" class="btn-remove-muestra" (click)="eliminarMuestra(muestra.id)" [disabled]="reviewMode">
            <ion-icon name="trash-outline"></ion-icon>
          </button>
        </div>
        <div class="muestra-card__body">
          <p class="muestra-hint">Análisis disponibles para esta SubMuestra</p>
          <div class="checklist-grid">
            <label class="checklist-item" *ngFor="let formulario of muestra.formularios"
              [class.checklist-item--obligatorio]="formulario.obligatorio">
              <input type="checkbox" class="form-checkbox" [checked]="formulario.seleccionado"
                [disabled]="reviewMode || formulario.obligatorio" (change)="toggleFormularioMuestra(muestra, formulario)" />
              <span class="checklist-item__name">{{ formulario.nombre }}</span>
              <span class="muestra-hint" *ngIf="formulario.seleccionado">
                LE: {{ formulario.codigoLe || 'No acreditado' }} - Norma: {{ formulario.metodologiaNorma || 'Sin norma' }} - Dias: {{ formulario.diasNegativo ?? '--' }}/{{ formulario.diasConfirmacion ?? '--' }}
              </span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

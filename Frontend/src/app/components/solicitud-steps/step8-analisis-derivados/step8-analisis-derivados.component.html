<div [formGroup]="parentForm">
  <div class="form-card-header">
    <div class="form-card-title-group">
      <ion-icon name="share-social-outline"></ion-icon>
      <h2 class="form-card-title">Etapa 8 — Análisis derivados o Subcontratados</h2>
    </div>
  </div>
  <div class="form-card-body">
    <div class="form-group">
      <label class="form-label">Detalle opcional</label>
      <textarea class="form-textarea" formControlName="analisisDerivadosSubcontratados" rows="5"
        placeholder="Registrar derivaciones o subcontrataciones, si aplica." [readonly]="reviewMode || isReadOnly"></textarea>
    </div>
  </div>
</div>

<div [formGroup]="parentForm">
  <div class="form-card-header">
    <div class="form-card-title-group">
      <ion-icon name="business-outline"></ion-icon>
      <h2 class="form-card-title">Etapa 2 — Información del Cliente</h2>
    </div>
  </div>
  <div class="form-card-body">
    <ion-grid>
      <ion-row>
        <ion-col size="12" size-md="6">
          <div class="form-group">
            <label class="form-label">Nombre del cliente <span class="req">*</span></label>
            <input type="text" class="form-input" formControlName="nombreCliente" [class.form-input--error]="campoInvalido('nombreCliente')" />
            <span class="error-msg" *ngIf="campoInvalido('nombreCliente')">Campo obligatorio.</span>
          </div>
        </ion-col>
        <ion-col size="12" size-md="6">
          <div class="form-group">
            <label class="form-label">Nombre del solicitante <span class="req">*</span></label>
            <input type="text" class="form-input" formControlName="nombreSolicitante" [class.form-input--error]="campoInvalido('nombreSolicitante')" />
            <span class="error-msg" *ngIf="campoInvalido('nombreSolicitante')">Campo obligatorio.</span>
          </div>
        </ion-col>
        <ion-col size="12">
          <div class="form-group">
            <label class="form-label">Dirección <span class="req">*</span></label>
            <input type="text" class="form-input" formControlName="direccion" [class.form-input--error]="campoInvalido('direccion')" />
            <span class="error-msg" *ngIf="campoInvalido('direccion')">Campo obligatorio.</span>
          </div>
        </ion-col>
        <ion-col size="12">
          <div class="form-group">
            <label class="form-label">Notas del cliente</label>
            <textarea class="form-textarea" formControlName="notasCliente" rows="3"></textarea>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</div>

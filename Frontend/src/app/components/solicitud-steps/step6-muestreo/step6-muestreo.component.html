<div [formGroup]="parentForm">
  <div class="form-card-header">
    <div class="form-card-title-group">
      <ion-icon name="archive-outline"></ion-icon>
      <h2 class="form-card-title">Etapa 6 — Envases y almacenamiento</h2>
    </div>
  </div>
  <div class="form-card-body">
    <ion-grid>
      <ion-row>
        <ion-col size="12" size-md="6">
          <div class="form-group">
            <label class="form-label">Lugar de almacenamiento <span class="req">*</span></label>
            <select class="form-select" formControlName="idLugar" [class.form-input--error]="campoInvalido('idLugar')">
              <option [ngValue]="null" disabled>Seleccione lugar</option>
              <option *ngFor="let equipo of equiposAlmacenamiento" [ngValue]="equipo.idEquipo">{{ equipo.nombreEquipo }}</option>
            </select>
          </div>
        </ion-col>
        <ion-col size="12" size-md="6">
          <div class="form-group">
            <label class="form-label">Envases suministrados por <span class="req">*</span></label>
            <input type="text" class="form-input" formControlName="envasesSuministradosPor" [class.form-input--error]="campoInvalido('envasesSuministradosPor')" />
          </div>
        </ion-col>
        <ion-col size="12">
          <div class="form-group form-group--checkbox-row">
            <label class="toggle-label">
              <input type="checkbox" class="form-checkbox" formControlName="muestraCompartida" />
              <span>Muestra compartida con Química</span>
            </label>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</div>

<aside class="sidebar">

  <!-- ── ZONA SUPERIOR: Logo ── -->
  <div class="sidebar-logo" (click)="goToHome()">
    <div class="sidebar-logo__icon">
      <ion-icon name="flask-outline"></ion-icon>
    </div>
    <div>
      <span class="logo-title">AsisTec</span>
      <span class="logo-sub">LAB MANAGEMENT</span>
    </div>
  </div>

  <!-- ── ZONA MEDIA: Navegación ── -->
  <nav class="sidebar-nav">
    <span class="nav-section-label">Menú</span>
    <ul>

      <!-- Home -->
      <li class="nav-item" [class.active]="activeSegment === 'home'" (click)="goToHome()" data-label="Home">
        <ion-icon name="home-outline"></ion-icon>
        <span class="nav-item-text">Home</span>
        <span class="nav-dot" *ngIf="activeSegment === 'home'">•</span>
      </li>

      <!-- Búsqueda ALI — visible para Analista (0), Coordinadora (1) y Jefe (2) -->
      <li *ngIf="canAccessNavigation([0, 1, 2, 4])"
          class="nav-item" [class.active]="activeSegment === 'busqueda'" (click)="busquedaALI()" data-label="Búsqueda ALI">
        <ion-icon name="search-outline"></ion-icon>
        <span class="nav-item-text">Búsqueda ALI</span>
        <span class="nav-dot" *ngIf="activeSegment === 'busqueda'">•</span>
      </li>

      <!-- Búsqueda Solicitud Ingreso — visible para Ingreso (3), Coordinadora (1) y Jefe (2) -->
      <li *ngIf="canAccessNavigation([1, 2, 3, 4])"
          class="nav-item" [class.active]="activeSegment === 'busqueda-solicitud'" (click)="busquedaSolicitudIngreso()" data-label="Búsqueda Solicitud">
        <ion-icon name="document-text-outline"></ion-icon>
        <span class="nav-item-text">Búsqueda Solicitud</span>
        <span class="nav-dot" *ngIf="activeSegment === 'busqueda-solicitud'">•</span>
      </li>

      <!-- Validación Solicitudes — visible para Coordinadora (1), Jefe (2) y Admin (4) -->
      <li *ngIf="canAccessNavigation([1, 2, 4])"
          class="nav-item" [class.active]="activeSegment === 'validacion-solicitudes'" (click)="validacionSolicitudes()" data-label="Validación Solicitudes">
        <ion-icon name="checkmark-done-circle-outline"></ion-icon>
        <span class="nav-item-text">Validación</span>
        <span class="nav-dot" *ngIf="activeSegment === 'validacion-solicitudes'">•</span>
      </li>

      <!-- Solicitud Ingreso — visible solo para Ingreso (3) -->
      <li *ngIf="canAccessNavigation([3, 4])"
          class="nav-item" [class.active]="activeSegment === 'solicitud'" (click)="solicitudIngreso()" data-label="Solicitud Ingreso">
        <ion-icon name="add-circle-outline"></ion-icon>
        <span class="nav-item-text">Solicitud Ingreso</span>
        <span class="nav-dot" *ngIf="activeSegment === 'solicitud'">•</span>
      </li>

      <!-- Formularios — visible para Analista (0) y Admin (4) -->
      <li *ngIf="canAccessNavigation([0, 4])" class="nav-item-group">
        <div class="nav-item" [class.active]="activeSegment === 'formularios'" (click)="toggleFormulariosMenu()">
          <ion-icon name="document-text-outline"></ion-icon>
          <span class="nav-item-text">Formularios</span>
          <ion-icon [name]="formulariosMenuOpen ? 'chevron-down-outline' : 'chevron-forward-outline'" class="nav-dot" style="font-size: 14px;"></ion-icon>
        </div>
        <ul class="submenu" *ngIf="formulariosMenuOpen">
          <li class="submenu-item" [class.active]="isRouteActive('/form-coliformes')" (click)="goToFormulario('/form-coliformes')">
            <span class="submenu-text">E. Coli</span>
          </li>
          <li class="submenu-item" [class.active]="isRouteActive('/form-s-aureus')" (click)="goToFormulario('/form-s-aureus')">
            <span class="submenu-text">S. Aureus</span>
          </li>
          <li class="submenu-item" [class.active]="isRouteActive('/form-enterobacterias')" (click)="goToFormulario('/form-enterobacterias')">
            <span class="submenu-text">Enterobacterias</span>
          </li>
          <li class="submenu-item" [class.active]="isRouteActive('/form-salmonella')" (click)="goToFormulario('/form-salmonella')">
            <span class="submenu-text">Salmonella</span>
          </li>
        </ul>
      </li>


    </ul>
  </nav>

  <!-- ── ZONA INFERIOR: Perfil de usuario ── -->
  <div class="sidebar-user">
    <div class="user-avatar" (click)="goToProfile()">{{ userInitials }}</div>
    <div class="user-info-block">
      <span class="user-name-text">{{ userName }}</span>
      <span class="user-role-text">{{ userRole }}</span>
    </div>
    <button class="sidebar-logout-btn" (click)="goToLogin()" title="Cerrar Sesión">
      <ion-icon name="log-out-outline"></ion-icon>
    </button>
  </div>

</aside>

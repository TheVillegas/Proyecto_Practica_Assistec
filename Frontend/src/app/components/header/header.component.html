<nav class="header-container">

  <!-- Izquierda: Branding -->
  <div class="logo-section" (click)="goToHome()">
    <div class="icon-box">
      <ion-icon name="flask-outline"></ion-icon>
    </div>
    <div class="brand-group">
      <span class="brand-name">AsisTec</span>
      <span class="brand-subtitle">Lab Management</span>
    </div>
  </div>

  <!-- Centro: Navegación (Píldora) -->
  <div class="nav-pill-container">

    <!-- Home -->
    <button (click)="goToHome()" 
      [ngClass]="{'active': activeSegment === 'home', 'inactive': activeSegment !== 'home'}"
      class="nav-btn">
      Home
    </button>

    <!-- Menú Desplegable Búsquedas -->
    <div class="relative group">
      <button [ngClass]="{'active': activeSegment === 'busqueda', 'inactive': activeSegment !== 'busqueda'}" class="nav-btn flex items-center gap-1">
        Búsquedas <ion-icon name="chevron-down-outline" class="text-xs transition-transform group-hover:rotate-180"></ion-icon>
      </button>
      
      <!-- Dropdown Content -->
      <div class="dropdown-menu absolute left-0 mt-2 w-56 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50 transform origin-top-left scale-95 group-hover:scale-100">
        <div class="py-1" role="menu" aria-orientation="vertical">
          <a (click)="busquedaALI()" class="block px-4 py-2 text-sm text-gray-700 hover:bg-brand-primary/10 hover:text-brand-primary cursor-pointer transition-colors" role="menuitem">Búsqueda ALI</a>
          <a (click)="busquedaSolicitudIngreso()" class="block px-4 py-2 text-sm text-gray-700 hover:bg-brand-primary/10 hover:text-brand-primary cursor-pointer transition-colors border-t border-gray-100" role="menuitem">Búsqueda Solicitud de Ingreso</a>
        </div>
      </div>
    </div>

    <!-- Solicitud Ingreso -->
    <button (click)="solicitudIngreso()"
      [ngClass]="{'active': activeSegment === 'solicitud', 'inactive': activeSegment !== 'solicitud'}" class="nav-btn">
      Solicitud Ingreso
    </button>

    <!-- Generar ALI -->
    <button (click)="generarALI()"
      [ngClass]="{'active': activeSegment === 'generar', 'inactive': activeSegment !== 'generar'}" class="nav-btn">
      Generar ALI
    </button>
  </div>

  <!-- Derecha: Perfil -->
  <div class="user-section">
    <!-- Info Usuario -->
    <div class="user-info">
      <div class="user-name">{{ userName }}</div>
      <div class="user-role">{{ userRole }}</div>
    </div>

    <!-- Avatar -->
    <div class="avatar-box group" (click)="goToProfile()" style="cursor: pointer;">
      <img [src]="userPhoto" alt="Avatar" class="w-full h-full object-cover">
    </div>

    <!-- Separador -->
    <div class="separator"></div>

    <!-- Botón Salir -->
    <button (click)="goToLogin()" class="logout-btn" title="Cerrar Sesión">
      <ion-icon name="log-out-outline"></ion-icon>
    </button>
  </div>

</nav>

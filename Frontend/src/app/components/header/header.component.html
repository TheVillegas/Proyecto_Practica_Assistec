<nav class="header-container">
  <div class="logo-section" (click)="goToHome()">
    <div class="icon-box">
      <ion-icon name="flask-outline"></ion-icon>
    </div>
    <div class="brand-group">
      <span class="brand-name">AsisTec</span>
      <span class="brand-subtitle">Lab Management</span>
    </div>
  </div>

  <div class="nav-pill-container">
    <button (click)="goToHome()" [ngClass]="{'active': activeSegment === 'home', 'inactive': activeSegment !== 'home'}" class="nav-btn">
      Home
    </button>

    <button (click)="busquedaALI()" [ngClass]="{'active': activeSegment === 'busqueda', 'inactive': activeSegment !== 'busqueda'}" class="nav-btn">
      Búsqueda ALI
    </button>

    <button (click)="generarALI()" [ngClass]="{'active': activeSegment === 'generar', 'inactive': activeSegment !== 'generar'}" class="nav-btn">
      Solicitud Ingreso
    </button>
  </div>

  <div class="user-section">
    <div class="user-info">
      <div class="user-name">{{ userName }}</div>
      <div class="user-role">{{ userRole }}</div>
    </div>

    <div class="avatar-box group" (click)="goToProfile()" style="cursor: pointer;">
      <img [src]="userPhoto" alt="Avatar" class="w-full h-full object-cover">
    </div>

    <div class="separator"></div>

    <button (click)="goToLogin()" class="logout-btn" title="Cerrar Sesión">
      <ion-icon name="log-out-outline"></ion-icon>
    </button>
  </div>
</nav>

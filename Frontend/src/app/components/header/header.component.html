<aside class="sidebar">

  <!-- ── ZONA SUPERIOR: Logo ── -->
  <div class="sidebar-logo" (click)="goToHome()">
    <div class="sidebar-logo__icon">
      <ion-icon name="flask-outline"></ion-icon>
    </div>
    <div>
      <span class="logo-title">AsisTec</span>
      <span class="logo-sub">LAB MANAGEMENT</span>
    </div>
  </div>

  <!-- ── ZONA MEDIA: Navegación ── -->
  <nav class="sidebar-nav">
    <span class="nav-section-label">Menú</span>
    <ul>

      <!-- Home -->
      <li class="nav-item" [class.active]="activeSegment === 'home'" (click)="goToHome()" data-label="Home">
        <ion-icon name="home-outline"></ion-icon>
        <span class="nav-item-text">Home</span>
        <span class="nav-dot" *ngIf="activeSegment === 'home'">•</span>
      </li>

      <!-- Búsqueda ALI -->
      <li class="nav-item" [class.active]="activeSegment === 'busqueda'" (click)="busquedaALI()" data-label="Búsqueda ALI">
        <ion-icon name="search-outline"></ion-icon>
        <span class="nav-item-text">Búsqueda ALI</span>
        <span class="nav-dot" *ngIf="activeSegment === 'busqueda'">•</span>
      </li>

      <!-- Búsqueda Solicitud Ingreso -->
      <li class="nav-item" [class.active]="activeSegment === 'busqueda-solicitud'" (click)="busquedaSolicitudIngreso()" data-label="Búsqueda Solicitud">
        <ion-icon name="document-text-outline"></ion-icon>
        <span class="nav-item-text">Búsqueda Solicitud</span>
        <span class="nav-dot" *ngIf="activeSegment === 'busqueda-solicitud'">•</span>
      </li>

      <!-- Solicitud Ingreso -->
      <li class="nav-item" [class.active]="activeSegment === 'solicitud'" (click)="solicitudIngreso()" data-label="Solicitud Ingreso">
        <ion-icon name="add-circle-outline"></ion-icon>
        <span class="nav-item-text">Solicitud Ingreso</span>
        <span class="nav-dot" *ngIf="activeSegment === 'solicitud'">•</span>
      </li>

      <!-- Generar ALI -->
      <li class="nav-item" [class.active]="activeSegment === 'generar'" (click)="generarALI()" data-label="Generar ALI">
        <ion-icon name="time-outline"></ion-icon>
        <span class="nav-item-text">Generar ALI</span>
        <span class="nav-dot" *ngIf="activeSegment === 'generar'">•</span>
      </li>

    </ul>
  </nav>

  <!-- ── ZONA INFERIOR: Perfil de usuario ── -->
  <div class="sidebar-user">
    <div class="user-avatar" (click)="goToProfile()">{{ userInitials }}</div>
    <div class="user-info-block">
      <span class="user-name-text">{{ userName }}</span>
      <span class="user-role-text">{{ userRole }}</span>
    </div>
    <button class="sidebar-logout-btn" (click)="goToLogin()" title="Cerrar Sesión">
      <ion-icon name="log-out-outline"></ion-icon>
    </button>
  </div>

</aside>

services:

  # Base de Datos (PostgreSQL 16)
  BD_AsisTec:
    image: postgres:16
    container_name: contenedor_asistec_bd
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=${MI_CLAVE_POSTGRES:-admin123}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_DB=${NOMBRE_DB:-asistectest}
      - TZ=America/Santiago
      - PGTZ=America/Santiago
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${NOMBRE_DB:-asistectest}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Backend (Node.js + Prisma)
  backend_asistec:
    build:
      context: "./AssisTec API"
      dockerfile: Dockerfile
    container_name: contenedor_asistec_backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${MI_CLAVE_POSTGRES:-admin123}@BD_AsisTec:5432/${NOMBRE_DB:-asistectest}?schema=public
      - JWT_SECRET=${JWT_SECRET:-secreto_lab_pucv_2024}
      - PORT=3001
    depends_on:
      BD_AsisTec:
        condition: service_healthy

  # Frontend (Angular + nginx)
  frontend_asistec:
    build:
      context: "./Frontend"
      dockerfile: Dockerfile
    container_name: contenedor_asistec_frontend
    restart: always
    ports:
      - "8000:80"
    depends_on:
      - backend_asistec

volumes:
  pgdata:
